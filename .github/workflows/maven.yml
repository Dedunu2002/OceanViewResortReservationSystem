name: Java CI with Maven

on:
  push:
    branches: [ "main", "feature-*" ]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          # FIXED: Matching the name in your DBUtil.java
          MYSQL_DATABASE: ocean_view_db
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
      - uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # NEW STEP: This creates the tables in the cloud database
      - name: Initialize Database Schema
        run: mysql -h 127.0.0.1 -u root -proot ocean_view_db < ocean_view_db.sql

      - name: Build and Test with Maven
        run: mvn -B package --file pom.xml
        env:
          DB_URL: jdbc:mysql://localhost:3306/ocean_view_db
          DB_USER: root
          DB_PASSWORD: root