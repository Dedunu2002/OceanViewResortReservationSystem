<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Profile | Ocean View Resort</title>
    <style>
        :root { --primary: #0A2540; --accent: #C9A24D; --bg: #F5F7FA; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .profile-card { background: white; padding: 40px; border-radius: 8px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 400px; border-top: 5px solid var(--primary); text-align: center; }
        .avatar { width: 80px; height: 80px; background: var(--bg); border-radius: 50%; margin: 0 auto 20px; display: flex; align-items: center; justify-content: center; font-size: 30px; color: var(--primary); border: 2px solid var(--accent); }
        h2 { color: var(--primary); margin: 10px 0; text-transform: uppercase; }
        .info-group { margin: 20px 0; text-align: left; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        label { font-size: 11px; color: #888; text-transform: uppercase; font-weight: bold; }
        .value { font-size: 16px; color: var(--primary); font-weight: 600; }
        .btn-back { display: inline-block; margin-top: 20px; text-decoration: none; color: var(--accent); font-weight: bold; font-size: 13px; }
    </style>
</head>
<body>
<div class="profile-card">
    <div class="avatar">👤</div>
    <h2>Staff Profile</h2>
    <div class="info-group">
        <label>Employee ID</label>
        <div class="value" id="prof-id">Loading...</div>
    </div>
    <div class="info-group">
        <label>Username</label>
        <div class="value" id="prof-user">Loading...</div>
    </div>
    <div class="info-group">
        <label>Access Role</label>
        <div class="value" id="prof-role">Loading...</div>
    </div>
    <a href="javascript:history.back()" class="btn-back">← Return to Dashboard</a>
</div>

<script>
    fetch('api/profile')
        .then(res => {
            if (res.status === 401) window.location.href = 'login.html';
            return res.json();
        })
        .then(data => {
            document.getElementById('prof-id').innerText = `#${data.id}`;
            document.getElementById('prof-user').innerText = data.username;
            document.getElementById('prof-role').innerText = data.role;
        })
        .catch(() => alert('Failed to load profile.'));
</script>
</body>
</html>
