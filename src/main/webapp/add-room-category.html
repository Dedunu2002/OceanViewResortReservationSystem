<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add Room Category | Ocean View</title>
    <style>
        :root { --primary: #0A2540; --accent: #C9A24D; --bg: #F5F7FA; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; background: var(--bg); }
        /* --- LUXURY SIDEBAR --- */
        .sidebar {
            width: 300px;
            background: var(--primary);
            color: white;
            height: 100vh;
            position: fixed;
            display: flex;
            flex-direction: column;
            box-shadow: 10px 0 30px rgba(0,0,0,0.1);
            z-index: 100;
        }

        /* 1. Logo Section */
        .logo-container {
            padding: 40px 30px;
            display: flex;
            align-items: center;
            gap: 15px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .logo-icon {
            width: 45px;
            height: 45px;
            background: linear-gradient(135deg, var(--accent), #e2c275);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            color: var(--primary);
            box-shadow: 0 4px 15px var(--accent-glow);
        }
        .logo-text {
            font-family: 'Playfair Display', serif; /* Elegant Serif */
            font-weight: 700;
            letter-spacing: 1px;
            font-size: 1.1rem;
            color: var(--accent);
            text-transform: uppercase;
        }

        /* 2. Admin Role Card */
        .role-card-container {
            padding: 20px 30px;
        }
        .role-card {
            background: var(--secondary);
            padding: 15px;
            border-radius: 12px;
            border: 1px solid rgba(201, 162, 77, 0.2);
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .status-pulse {
            width: 8px;
            height: 8px;
            background: #48bb78;
            border-radius: 50%;
            box-shadow: 0 0 8px #48bb78;
            animation: pulse 2s infinite;
        }
        .role-info span {
            display: block;
            font-size: 0.75rem;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
        }

        /* 3. Navigation Sections */
        .nav-scroll {
            flex-grow: 1;
            overflow-y: auto;
            padding: 10px 20px;
        }

        .section-label {
            font-size: 0.7rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin: 25px 15px 10px;
            display: block;
        }

        .nav-link {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 12px 15px;
            color: rgba(255,255,255,0.7);
            text-decoration: none;
            border-radius: 8px;
            transition: 0.3s;
            margin-bottom: 5px;
            font-size: 0.9rem;
        }

        .nav-link i {
            width: 20px;
            text-align: center;
            font-size: 1.1rem;
            color: var(--accent);
        }

        .nav-link:hover, .nav-link.active {
            background: rgba(201, 162, 77, 0.1);
            color: var(--accent);
        }

        .nav-link.active {
            background: var(--accent);
            color: var(--primary);
        }
        .nav-link.active i { color: var(--primary); }

        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(72, 187, 120, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 6px rgba(72, 187, 120, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(72, 187, 120, 0); }
        }

        .main-content { flex: 1; padding: 50px; margin-left: 280px; display: flex; flex-direction: column; align-items: center; }
        .form-card { background: white; padding: 40px; border-radius: 8px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); width: 100%; max-width: 500px; border-top: 5px solid var(--accent); }
        .btn-add { width: 100%; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .btn-add:hover { background: var(--accent); }
    </style>
</head>
<body>
<div class="sidebar">
    <div class="logo-container">

        <img class="logo-icon" src='images/logo.png' >
        <div class="logo-text">Ocean View<br><span style="font-size: 0.7rem; opacity: 0.8;">Resort & Spa</span></div>
    </div>

    <div class="role-card-container">
        <div class="role-card">
            <div class="status-pulse"></div>
            <div class="role-info">
                <span>System Administrator</span>
            </div>
        </div>
    </div>

    <div class="nav-scroll">
        <a href="admin-dashboard.html" class="nav-link active">
            <i class="fa-solid fa-chart-line"></i> Executive Dashboard
        </a>

        <span class="section-label">System Oversight</span>
        <a href="index.html" class="nav-link">
            <i class="fa-solid fa-calendar-plus"></i> Add New Reservation
        </a>
        <a href="view-reservations" class="nav-link">
            <i class="fa-solid fa-rectangle-list"></i> View Reservations
        </a>
        <a href="daily-summary" class="nav-link">
            <i class="fa-solid fa-file-invoice-dollar"></i> Daily Summary
        </a>
        <a href="update-rates.html" class="nav-link">
            <i class="fa-solid fa-tags"></i> Room Pricing
        </a>

        <span class="section-label">Operations</span>
        <a href="manage-staff.html" class="nav-link">
            <i class="fa-solid fa-users-gear"></i> Staff Management
        </a>
        <a href="help.html" class="nav-link">
            <i class="fa-solid fa-book-open"></i> Operational Guide
        </a>
        <a href="add-room-category.html" class="nav-link">
            <i class="fa-solid fa-tags"></i>Add Room Category</a>

        <a href="add-room.html" class="nav-link">
            <i class="fa-solid fa-tags"></i>Room Managment</a>

        <span class="section-label">Account</span>
        <a href="profile.html" class="nav-link">
            <i class="fa-solid fa-user-shield"></i> My Profile
        </a>
        <a href="logout" class="nav-link" style="color: #fc8181;">
            <i class="fa-solid fa-right-from-bracket" style="color: #fc8181;"></i> Logout
        </a>
    </div>
</div>

<div class="main-content">
    <div class="form-card">
        <h2>Add New Room Category</h2>
        <form action="AddCategoryServlet" method="POST">
            <div style="margin-bottom: 20px;">
                <label style="display:block; font-size:12px; font-weight:600; margin-bottom:8px;">NEW CATEGORY NAME</label>
                <input type="text" name="room_type" placeholder="e.g. Deluxe Suite" required style="width:100%; padding:12px; border:1px solid #ddd; border-radius:4px;">
            </div>
            <div style="margin-bottom: 20px;">
                <label style="display:block; font-size:12px; font-weight:600; margin-bottom:8px;">BASE PRICE (PER NIGHT)</label>
                <input type="number" name="price" placeholder="20000" required style="width:100%; padding:12px; border:1px solid #ddd; border-radius:4px;">
            </div>
            <div style="margin-bottom: 20px;">
                <label style="display:block; font-size:12px; font-weight:600; margin-bottom:8px;">TOTAL CAPACITY</label>
                <input type="number" name="capacity" placeholder="10" required style="width:100%; padding:12px; border:1px solid #ddd; border-radius:4px;">
            </div>
            <button type="submit" class="btn-add">REGISTER CATEGORY</button>
        </form>
    </div>
</div>
</body>
</html>
