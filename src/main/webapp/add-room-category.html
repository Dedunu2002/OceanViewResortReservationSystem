<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add Room Category | Ocean View</title>
    <style>
        :root { --primary: #0A2540; --accent: #C9A24D; --bg: #F5F7FA; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; background: var(--bg); }
        .sidebar { width: 280px; background: var(--primary); color: white; height: 100vh; padding: 30px; position: fixed; }
        .sidebar a { color: #cbd5e1; display: block; padding: 15px 0; text-decoration: none; }
        .main-content { flex: 1; padding: 50px; margin-left: 280px; display: flex; flex-direction: column; align-items: center; }
        .form-card { background: white; padding: 40px; border-radius: 8px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); width: 100%; max-width: 500px; border-top: 5px solid var(--accent); }
        .btn-add { width: 100%; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .btn-add:hover { background: var(--accent); }
    </style>
</head>
<body>
<div class="sidebar">
    <h2>OCEAN VIEW</h2>
    <a href="admin-dashboard.html">Dashboard Overview</a>
    <a href="update-rates.html">Rate Management</a>
    <a href="view-reservations">System Oversight</a>
</div>
<div class="main-content">
    <div class="form-card">
        <h2>Add New Room Category</h2>
        <form action="AddCategoryServlet" method="POST">
            <div style="margin-bottom: 20px;">
                <label style="display:block; font-size:12px; font-weight:600; margin-bottom:8px;">NEW CATEGORY NAME</label>
                <input type="text" name="room_type" placeholder="e.g. Deluxe Suite" required style="width:100%; padding:12px; border:1px solid #ddd; border-radius:4px;">
            </div>
            <div style="margin-bottom: 20px;">
                <label style="display:block; font-size:12px; font-weight:600; margin-bottom:8px;">BASE PRICE (PER NIGHT)</label>
                <input type="number" name="price" placeholder="20000" required style="width:100%; padding:12px; border:1px solid #ddd; border-radius:4px;">
            </div>
            <div style="margin-bottom: 20px;">
                <label style="display:block; font-size:12px; font-weight:600; margin-bottom:8px;">TOTAL CAPACITY</label>
                <input type="number" name="capacity" placeholder="10" required style="width:100%; padding:12px; border:1px solid #ddd; border-radius:4px;">
            </div>
            <button type="submit" class="btn-add">REGISTER CATEGORY</button>
        </form>
    </div>
</div>
</body>
</html>
