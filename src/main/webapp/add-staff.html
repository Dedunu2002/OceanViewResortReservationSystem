<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add New Staff | Ocean View Resort</title>
    <style>
        :root {
            --primary: #0A2540;
            --accent: #C9A24D;
            --bg: #F5F7FA;
            --white: #ffffff;
            --success: #388E3C;
            --error: #D32F2F;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .form-card {
            background: var(--white);
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
            border-top: 5px solid var(--primary);
        }

        h2 {
            color: var(--primary);
            margin-bottom: 30px;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .form-group { margin-bottom: 20px; }

        label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--primary);
        }

        input, select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 14px;
        }

        input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 5px rgba(201, 162, 77, 0.2);
        }

        .btn-submit {
            width: 100%;
            padding: 15px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
            margin-top: 10px;
        }

        .btn-submit:hover { background-color: var(--accent); }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            text-decoration: none;
            color: #666;
            font-size: 13px;
        }

        #status-message {
            padding: 12px;
            border-radius: 4px;
            margin-bottom: 20px;
            text-align: center;
            font-size: 14px;
            display: none;
        }
    </style>
</head>
<body>

<div class="form-card">
    <h2>New Staff Account</h2>

    <div id="status-message"></div>

    <form id="addStaffForm">
        <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" placeholder="e.g. john_doe" required>
        </div>

        <div class="form-group">
            <label for="password">Initial Password</label>
            <input type="password" id="password" name="password" required>
        </div>

        <div class="form-group">
            <label for="role">System Access Level</label>
            <select id="role" name="role">
                <option value="RECEPTIONIST">Receptionist (Front Desk)</option>
                <option value="ADMIN">Administrator (Executive)</option>
            </select>
        </div>

        <button type="submit" class="btn-submit">CREATE ACCOUNT</button>
    </form>

    <a href="manage-staff.html" class="back-link">← Return to Staff Directory</a>
</div>

<script>
    const staffForm = document.getElementById('addStaffForm');
    const statusMsg = document.getElementById('status-message');

    staffForm.addEventListener('submit', function(e) {
        e.preventDefault(); // Prevent standard page reload

        const formData = new URLSearchParams(new FormData(staffForm));

        fetch('AddStaffServlet', {
            method: 'POST',
            body: formData,
            headers: {
                'Content-Type': 'application/x-www-form-urlencoded'
            }
        })
        .then(response => {
            if (response.redirected) {
                // If the servlet sends a redirect, handle it
                window.location.href = response.url;
                return;
            }
            if (response.ok) {
                showMessage('Staff created successfully!', 'var(--success)');
                staffForm.reset();
            } else {
                showMessage('Error creating account. Access denied.', 'var(--error)');
            }
        })
        .catch(error => {
            showMessage('Server connection failed.', 'var(--error)');
        });
    });

    function showMessage(text, color) {
        statusMsg.innerText = text;
        statusMsg.style.backgroundColor = color;
        statusMsg.style.color = 'white';
        statusMsg.style.display = 'block';

        // Hide message after 5 seconds
        setTimeout(() => { statusMsg.style.display = 'none'; }, 5000);
    }
</script>

</body>
</html>
