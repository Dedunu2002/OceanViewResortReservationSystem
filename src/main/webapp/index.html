<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Guest Registration | Ocean View</title>
    <style>
        :root {
            --primary: #0A2540; --secondary: #1E6F9F; --accent: #C9A24D;
            --bg: #F5F7FA; --text-main: #1C1C1C;
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 50px; }
        .form-container {
            max-width: 600px; margin: 0 auto; background: white; padding: 40px;
            border-radius: 4px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); border-top: 5px solid var(--primary);
        }
        h2 { color: var(--primary); text-transform: uppercase; letter-spacing: 2px; text-align: center; margin-bottom: 30px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-size: 12px; font-weight: 600; color: var(--primary); margin-bottom: 8px; text-transform: uppercase; }
        input, select {
            width: 100%; padding: 12px; border: 1px solid #E5E7EB; border-radius: 3px;
            box-sizing: border-box; font-size: 14px; background: #FCFDFF;
        }
        input:focus { outline: none; border-color: var(--secondary); box-shadow: 0 0 0 3px rgba(30, 111, 159, 0.1); }
        button {
            width: 100%; padding: 16px; background: var(--accent); color: white; border: none;
            border-radius: 3px; cursor: pointer; font-size: 14px; font-weight: bold;
            text-transform: uppercase; letter-spacing: 1px; transition: 0.3s; margin-top: 10px;
        }
        button:hover { background: #B08D3E; transform: translateY(-1px); }
        .back-link { display: block; text-align: center; margin-top: 20px; color: var(--text-muted); text-decoration: none; font-size: 13px; }

        /* Full-screen Loader */
#loader {
    position: fixed;
    width: 100%;
    height: 100%;
    background: #0A2540; /* Match your --primary color */
    z-index: 9999;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    color: white;
    transition: opacity 0.8s ease;
}

/* Spinning Anchor Animation */
.anchor-icon {
    font-size: 50px;
    animation: anchor-spin 2s infinite linear;
    margin-bottom: 15px;
}

@keyframes anchor-spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}

/* Video Background */
.video-background {
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    z-index: -1;
    overflow: hidden;
}

#bgVideo {
    min-width: 100%; min-height: 100%;
    object-fit: cover;
    filter: brightness(50%); /* Dims video so text is readable */
}

/* Page Load Transition */
.fade-in {
    animation: fadeInPage 1.5s forwards;
}

@keyframes fadeInPage {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
}

/* Modern Glass Effect for Forms */
.form-container {
    background: rgba(255, 255, 255, 0.85) !important;
    backdrop-filter: blur(10px); /* Blurs the video behind the form */
    border: 1px solid rgba(255, 255, 255, 0.3);
}
    </style>
</head>
<body>



<div class="video-background">
    <video autoplay muted loop playsinline id="bgVideo">
        <source src="videos/background-video.mp4" type="video/mp4">
    </video>
</div>

<div class="form-container fade-in">
</div>



<div class="form-container">
    <h2>Guest Registration</h2>
    <form action="booking" method="POST" novalidate>
        <div class="form-group">
            <label>Full Name</label>
            <input type="text" name="guest_name" placeholder="Your Name">
        </div>

        <div class="form-group" style="display: flex; gap: 20px;">
            <div style="flex: 1;">
                <label>Contact Number</label>
                <input type="text" name="contact_number" placeholder="e.g. 0771234567">
            </div>
            <div style="flex: 1;">
                <label>Email Address</label>
                <input type="email" name="email" placeholder="guest@example.com">
            </div>

            <div style="flex: 1;">
                <label>Address</label>
                <input type="text" name="address" placeholder="Your City">
            </div>
        </div>

        <div class="form-group">
            <label>Room Category</label>
            <select name="room_type">
                <option value="Standard">Standard Garden View</option>
                <option value="Deluxe">Deluxe Ocean Wing</option>
                <option value="Luxury">Luxury Presidential Suite</option>
            </select>
        </div>

        <div class="form-group" style="display: flex; gap: 20px;">
            <div style="flex: 1;">
                <label>Check-in Date</label>
                <input type="date" name="check_in">
            </div>
            <div style="flex: 1;">
                <label>Check-out Date</label>
                <input type="date" name="check_out">
            </div>
        </div>
        <button type="submit">Confirm Reservation</button>
    </form>
    <a href="receptionist-dashboard.jsp" class="back-link">Return to Reception Hub</a>
</div>
<script>
    // This runs as soon as the page loads to check the URL for errors
    window.addEventListener("DOMContentLoaded", function() {
        const urlParams = new URLSearchParams(window.location.search);

        if (urlParams.get('error') === 'no_availability') {
            // Retrieve the 'type' value from the URL (?type=Luxury)
            const roomCategory = urlParams.get('type');

            if (roomCategory) {
                alert("SORRY: All " + roomCategory + " rooms are fully booked for these dates!");
            } else {
                // Fallback in case 'type' was missing from the URL
                alert("SORRY: This room category is fully booked for these dates!");
            }

            // Optional: Clean the URL so the alert doesn't show again if they refresh
            window.history.replaceState({}, document.title, window.location.pathname);
        }
    });

        document.querySelector("form").addEventListener("submit", function(event) {
       const name = document.getElementsByName("guest_name")[0].value.trim();
       const contact = document.getElementsByName("contact_number")[0].value.trim(); // Fixed
       const email = document.getElementsByName("email")[0].value.trim();
       const checkInVal = document.getElementsByName("check_in")[0].value;
       const checkOutVal = document.getElementsByName("check_out")[0].value;

       if (!name || !contact || !email || !checkInVal || !checkOutVal) {
           alert("Luxury Management: Please complete all fields.");
           event.preventDefault(); // This stops the 'localhost' submission
           return;
       }

            //Contact Number Validation (Digits only, 10 characters)
            const phonePattern = /^[0-9]{10}$/;
            if (!phonePattern.test(contact)) {
                alert("Invalid Contact: Please enter a 10-digit phone number.");
                event.preventDefault();
                return;
            }

            //Email Validation (Standard format check)
            const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailPattern.test(email)) {
                alert("Invalid Email: Please enter a valid email address.");
                event.preventDefault();
                return;
            }

            //Date Logic Validation
            const checkIn = new Date(checkInVal);
            const checkOut = new Date(checkOutVal);
            if (checkOut <= checkIn) {
                alert("Date Error: Check-out must be after Check-in.");
                event.preventDefault();
            }

            //Get Today's Date (at midnight for fair comparison)
    const today = new Date();
    today.setHours(0, 0, 0, 0);

    //Parse the Selected Check-in Date
    const selectedCheckIn = new Date(checkInVal);

    //Past Date Validation
    if (selectedCheckIn < today) {
        alert("Localhost says: Invalid Check-in Date! Please select today or a future date.");
        event.preventDefault(); // Stop form submission
        return;
    }







        });
</script>
</body>
</html>
