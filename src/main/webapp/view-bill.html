<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Guest Invoice | Ocean View</title>
    <style>
        :root { --primary: #0A2540; --accent: #C9A24D; --bg: #F5F7FA; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); padding: 50px; }

        .bill-container {
            background: white; padding: 60px; max-width: 800px; margin: 0 auto;
            box-shadow: 0 0 20px rgba(0,0,0,0.1); border-top: 8px solid var(--primary);
        }

        .bill-header { display: flex; justify-content: space-between; border-bottom: 2px solid #eee; padding-bottom: 20px; }
        .resort-info h2 { color: var(--primary); margin: 0; letter-spacing: 2px; }

        .bill-details { margin-top: 40px; display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .bill-table { width: 100%; border-collapse: collapse; margin-top: 30px; }
        .bill-table th { background: #f8fafc; text-align: left; padding: 12px; border-bottom: 2px solid #eee; }
        .bill-table td { padding: 12px; border-bottom: 1px solid #eee; }

        .total-row { font-size: 20px; font-weight: bold; color: var(--primary); text-align: right; margin-top: 30px; }

        .print-btn {
            background: var(--accent); color: white; padding: 10px 25px; border: none;
            border-radius: 4px; cursor: pointer; float: right; margin-bottom: 20px;
        }

        /* Essential for professional printing */
        @media print {
            .print-btn, .back-link { display: none; }
            body { background: white; padding: 0; }
            .bill-container { box-shadow: none; border: none; max-width: 100%; }
        }
    </style>
</head>
<body>
<button class="print-btn" onclick="window.print()">PRINT INVOICE</button>

<div class="bill-container" id="billContent">
    <div class="bill-header">
        <div class="resort-info">
            <h2>OCEAN VIEW</h2>
            <p>Luxury Resort & Spa</p>
        </div>
        <div class="bill-meta">
            <p><strong>Invoice #:</strong> <span id="bill-id">---</span></p>
            <p><strong>Date:</strong> <span id="bill-date">---</span></p>
        </div>
    </div>

    <div class="bill-details">
        <div>
            <p><strong>Guest Name:</strong> <br><span id="guest-name">---</span></p>
            <p><strong>Stay Period:</strong> <br><span id="stay-period">--- to ---</span></p>
        </div>
        <div>
            <p><strong>Room Type:</strong> <br><span id="room-type">---</span></p>
            <p><strong>Total Nights:</strong> <br><span id="header-nights">0</span> Nights</p>
        </div>
    </div>

    <table class="bill-table">
        <thead>
        <tr>
            <th>Description</th>
            <th>Rate</th>
            <th>Nights</th>
            <th>Total</th>
        </tr>
        </thead>
        <tbody>
        <tr>
            <td>Room Charges</td>
            <td id="rate-cell">0.00</td>
            <td id="nights-cell">0</td>
            <td id="subtotal-cell">0.00</td>
        </tr>
        </tbody>
    </table>

    <div class="total-row">
        Grand Total: Rs. <span id="total-val">0.00</span>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', () => {
    const params = new URLSearchParams(window.location.search);
    const resId = params.get('id');

    fetch(`api/get-bill?id=${resId}`)
        .then(res => res.json())
        .then(data => {
    // Header Info
    document.getElementById('bill-id').innerText = data.id;
    document.getElementById('bill-date').innerText = new Date().toLocaleDateString();
    document.getElementById('guest-name').innerText = data.guestName;
    document.getElementById('room-type').innerText = data.roomType;

    // Display Stay Period and Nights in Header
    document.getElementById('stay-period').innerText = `${data.checkIn} to ${data.checkOut}`;
    document.getElementById('header-nights').innerText = data.nights;

    // Table Content (as requested: Rate and Nights)
    document.getElementById('rate-cell').innerText = data.rate.toLocaleString(undefined, {minimumFractionDigits: 2});
    document.getElementById('nights-cell').innerText = data.nights;
    document.getElementById('subtotal-cell').innerText = data.totalBill.toLocaleString(undefined, {minimumFractionDigits: 2});

    // Grand Total
    document.getElementById('total-val').innerText = data.totalBill.toLocaleString(undefined, {minimumFractionDigits: 2});
})
        .catch(err => console.error("Billing Error:", err));
});
</script>
</body>
</html>
