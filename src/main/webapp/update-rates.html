<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Room Rates | Ocean View</title>
    <style>
        /* --- YOUR ORIGINAL LUXURY DESIGN --- */
        :root {
            --primary: #0A2540;
            --accent: #C9A24D;
            --bg: #F5F7FA;
            --text-main: #1C1C1C;
            --white: #ffffff;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            display: flex;
            background: var(--bg);
            color: var(--text-main);
        }

        .sidebar {
            width: 280px;
            background: var(--primary);
            color: white;
            height: 100vh;
            padding: 30px;
            box-sizing: border-box;
            position: fixed;
        }

        .sidebar h2 { font-size: 18px; letter-spacing: 2px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 20px; }
        .sidebar p { font-size: 11px; color: var(--accent); margin-bottom: 30px; }
        .sidebar a { color: #cbd5e1; display: block; padding: 15px 0; text-decoration: none; font-size: 14px; transition: 0.3s; }
        .sidebar a:hover { color: var(--accent); }

        .main-content { flex: 1; padding: 50px; margin-left: 280px; display: flex; flex-direction: column; align-items: center; }

        .header { width: 100%; max-width: 500px; margin-bottom: 30px; }

        .form-card {
            background: var(--white);
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 500px;
            border-top: 5px solid var(--primary);
        }

        h2 { color: var(--primary); margin-top: 0; text-transform: uppercase; letter-spacing: 1px; font-size: 20px; }

        .form-group { margin-bottom: 20px; }

        label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--primary);
            text-transform: uppercase;
        }

        input, select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 14px;
        }

        input:focus { outline: none; border-color: var(--accent); }

        .btn-update {
            width: 100%;
            padding: 15px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            letter-spacing: 1px;
        }

        .btn-update:hover { background-color: var(--accent); }

        #status-message {
            padding: 15px;
            border-radius: 4px;
            margin-bottom: 20px;
            text-align: center;
            display: none;
            width: 100%;
            max-width: 500px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>OCEAN VIEW</h2>
        <p>ADMINISTRATIVE PORTAL</p>
        <a href="admin-dashboard.html">Dashboard Overview</a>
        <a href="manage-staff.html">Staff Management</a>
        <a href="view-reservations">System Oversight</a>
        <a href="help.html">Operational Guide</a>
        <a href="logout" style="color: #ef4444; border-top: 1px solid rgba(255,255,255,0.1); margin-top: 20px; padding-top: 20px;">Exit System</a>
    </div>

    <div class="main-content">
        <div class="header">
            <h1>Rate Management</h1>
        </div>

        <div id="status-message"></div>

        <div class="form-card">
            <h2>Update Room Settings</h2>
            <form id="rateForm">

                    <div class="form-group">
                        <label>Room Category</label>
                        <select name="room_type" id="room_type_select">
                            <option value="">Loading categories...</option>
                        </select>

                    </div>


                <div class="form-group">
                    <label>New Price (per night)</label>
                    <input type="number" name="new_price" placeholder="e.g. 25000" required>
                </div>

                <div class="form-group">
                    <label>Total Inventory (Rooms Available)</label>
                    <input type="number" name="new_capacity" placeholder="e.g. 50" required>
                </div>

                <button type="submit" class="btn-update">APPLY NEW SETTINGS</button>

            </form>

        </div>
    </div>

    <script>
        const rateForm = document.getElementById('rateForm');
        const statusMsg = document.getElementById('status-message');

        rateForm.addEventListener('submit', function(e) {
            e.preventDefault();

            const formData = new URLSearchParams(new FormData(rateForm));

            fetch('UpdateRatesServlet', {
                method: 'POST',
                body: formData,
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' }
            })
            .then(response => {
                if (response.ok) {
                    showStatus('Room settings updated successfully.', '#388E3C');
                    rateForm.reset();
                } else {
                    showStatus('Error: Unauthorized or server error.', '#D32F2F');
                }
            })
            .catch(error => showStatus('Connection to server failed.', '#D32F2F'));
        });

        function showStatus(text, color) {
            statusMsg.innerText = text;
            statusMsg.style.backgroundColor = color;
            statusMsg.style.color = 'white';
            statusMsg.style.display = 'block';
            setTimeout(() => { statusMsg.style.display = 'none'; }, 5000);
        }

        document.addEventListener('DOMContentLoaded', function() {
    const roomSelect = document.getElementById('room_type_select');

    // Fetch the dynamic list from our Java Backend
    fetch('api/get-categories')
        .then(response => response.json())
        .then(categories => {
            // Clear the "Loading..." message
            roomSelect.innerHTML = "";

            if(categories.length === 0) {
                roomSelect.innerHTML = '<option value="">No categories available</option>';
            } else {
                categories.forEach(category => {
                    const option = document.createElement('option');
                    option.value = category;
                    option.textContent = category;
                    roomSelect.appendChild(option);
                });
            }
        })
        .catch(error => {
            console.error('Error loading categories:', error);
            roomSelect.innerHTML = '<option value="">Error loading categories</option>';
        });
});
    </script>
</body>
</html>
