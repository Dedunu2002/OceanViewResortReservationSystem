<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Room Rates | Ocean View</title>
    <style>
        /* --- YOUR ORIGINAL LUXURY DESIGN --- */
        :root {
            --primary: #0A2540;
            --accent: #C9A24D;
            --bg: #F5F7FA;
            --text-main: #1C1C1C;
            --white: #ffffff;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            display: flex;
            background: var(--bg);
            color: var(--text-main);
        }

        /* --- LUXURY SIDEBAR --- */
        .sidebar {
            width: 300px;
            background: var(--primary);
            color: white;
            height: 100vh;
            position: fixed;
            display: flex;
            flex-direction: column;
            box-shadow: 10px 0 30px rgba(0,0,0,0.1);
            z-index: 100;
        }

        /* 1. Logo Section */
        .logo-container {
            padding: 40px 30px;
            display: flex;
            align-items: center;
            gap: 15px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .logo-icon {
            width: 45px;
            height: 45px;
            background: linear-gradient(135deg, var(--accent), #e2c275);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            color: var(--primary);
            box-shadow: 0 4px 15px var(--accent-glow);
        }
        .logo-text {
            font-family: 'Playfair Display', serif; /* Elegant Serif */
            font-weight: 700;
            letter-spacing: 1px;
            font-size: 1.1rem;
            color: var(--accent);
            text-transform: uppercase;
        }

        /* 2. Admin Role Card */
        .role-card-container {
            padding: 20px 30px;
        }
        .role-card {
            background: var(--secondary);
            padding: 15px;
            border-radius: 12px;
            border: 1px solid rgba(201, 162, 77, 0.2);
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .status-pulse {
            width: 8px;
            height: 8px;
            background: #48bb78;
            border-radius: 50%;
            box-shadow: 0 0 8px #48bb78;
            animation: pulse 2s infinite;
        }
        .role-info span {
            display: block;
            font-size: 0.75rem;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
        }

        /* 3. Navigation Sections */
        .nav-scroll {
            flex-grow: 1;
            overflow-y: auto;
            padding: 10px 20px;
        }

        .section-label {
            font-size: 0.7rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin: 25px 15px 10px;
            display: block;
        }

        .nav-link {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 12px 15px;
            color: rgba(255,255,255,0.7);
            text-decoration: none;
            border-radius: 8px;
            transition: 0.3s;
            margin-bottom: 5px;
            font-size: 0.9rem;
        }

        .nav-link i {
            width: 20px;
            text-align: center;
            font-size: 1.1rem;
            color: var(--accent);
        }

        .nav-link:hover, .nav-link.active {
            background: rgba(201, 162, 77, 0.1);
            color: var(--accent);
        }

        .nav-link.active {
            background: var(--accent);
            color: var(--primary);
        }
        .nav-link.active i { color: var(--primary); }

        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(72, 187, 120, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 6px rgba(72, 187, 120, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(72, 187, 120, 0); }
        }

        .main-content { flex: 1; padding: 50px; margin-left: 280px; display: flex; flex-direction: column; align-items: center; }

        .header { width: 100%; max-width: 500px; margin-bottom: 30px; }

        .form-card {
            background: var(--white);
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 500px;
            border-top: 5px solid var(--primary);
        }

        h2 { color: var(--primary); margin-top: 0; text-transform: uppercase; letter-spacing: 1px; font-size: 20px; }

        .form-group { margin-bottom: 20px; }

        label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--primary);
            text-transform: uppercase;
        }

        input, select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 14px;
        }

        input:focus { outline: none; border-color: var(--accent); }

        .btn-update {
            width: 100%;
            padding: 15px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            letter-spacing: 1px;
        }

        .btn-update:hover { background-color: var(--accent); }

        #status-message {
            padding: 15px;
            border-radius: 4px;
            margin-bottom: 20px;
            text-align: center;
            display: none;
            width: 100%;
            max-width: 500px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="logo-container">

        <img class="logo-icon" src='images/logo.png' >
        <div class="logo-text">Ocean View<br><span style="font-size: 0.7rem; opacity: 0.8;">Resort & Spa</span></div>
    </div>

    <div class="role-card-container">
        <div class="role-card">
            <div class="status-pulse"></div>
            <div class="role-info">
                <span>System Administrator</span>
            </div>
        </div>
    </div>

    <div class="nav-scroll">
        <a href="admin-dashboard.html" class="nav-link active">
            <i class="fa-solid fa-chart-line"></i> Executive Dashboard
        </a>

        <span class="section-label">System Oversight</span>
        <a href="index.html" class="nav-link">
            <i class="fa-solid fa-calendar-plus"></i> Add New Reservation
        </a>
        <a href="view-reservations" class="nav-link">
            <i class="fa-solid fa-rectangle-list"></i> View Reservations
        </a>
        <a href="daily-summary" class="nav-link">
            <i class="fa-solid fa-file-invoice-dollar"></i> Daily Summary
        </a>
        <a href="update-rates.html" class="nav-link">
            <i class="fa-solid fa-tags"></i> Room Pricing
        </a>

        <span class="section-label">Operations</span>
        <a href="manage-staff.html" class="nav-link">
            <i class="fa-solid fa-users-gear"></i> Staff Management
        </a>
        <a href="help.html" class="nav-link">
            <i class="fa-solid fa-book-open"></i> Operational Guide
        </a>
        <a href="add-room-category.html" class="nav-link">
            <i class="fa-solid fa-tags"></i>Add Room Category</a>

        <a href="add-room.html" class="nav-link">
            <i class="fa-solid fa-tags"></i>Room Managment</a>

        <span class="section-label">Account</span>
        <a href="profile.html" class="nav-link">
            <i class="fa-solid fa-user-shield"></i> My Profile
        </a>
        <a href="logout" class="nav-link" style="color: #fc8181;">
            <i class="fa-solid fa-right-from-bracket" style="color: #fc8181;"></i> Logout
        </a>
    </div>
</div>


<div class="main-content">
        <div class="header">
            <h1>Rate Management</h1>
        </div>

        <div id="status-message"></div>

        <div class="form-card">
            <h2>Update Room Settings</h2>
            <form id="rateForm">

                    <div class="form-group">
                        <label>Room Category</label>
                        <select name="room_type" id="room_type_select">
                            <option value="">Loading categories...</option>
                        </select>

                    </div>


                <div class="form-group">
                    <label>New Price (per night)</label>
                    <input type="number" name="new_price" placeholder="e.g. 25000" required>
                </div>

                <div class="form-group">
                    <label>Total Inventory (Rooms Available)</label>
                    <input type="number" name="new_capacity" placeholder="e.g. 50" required>
                </div>

                <button type="submit" class="btn-update">APPLY NEW SETTINGS</button>

            </form>

        </div>
    </div>

    <script>
        const rateForm = document.getElementById('rateForm');
        const statusMsg = document.getElementById('status-message');

        rateForm.addEventListener('submit', function(e) {
            e.preventDefault();

            const formData = new URLSearchParams(new FormData(rateForm));

            fetch('UpdateRatesServlet', {
                method: 'POST',
                body: formData,
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' }
            })
            .then(response => {
                if (response.ok) {
                    showStatus('Room settings updated successfully.', '#388E3C');
                    rateForm.reset();
                } else {
                    showStatus('Error: Unauthorized or server error.', '#D32F2F');
                }
            })
            .catch(error => showStatus('Connection to server failed.', '#D32F2F'));
        });

        function showStatus(text, color) {
            statusMsg.innerText = text;
            statusMsg.style.backgroundColor = color;
            statusMsg.style.color = 'white';
            statusMsg.style.display = 'block';
            setTimeout(() => { statusMsg.style.display = 'none'; }, 5000);
        }

        document.addEventListener('DOMContentLoaded', function() {
    const roomSelect = document.getElementById('room_type_select');

    // Fetch the dynamic list from our Java Backend
    fetch('api/get-categories')
        .then(response => response.json())
        .then(categories => {
            // Clear the "Loading..." message
            roomSelect.innerHTML = "";

            if(categories.length === 0) {
                roomSelect.innerHTML = '<option value="">No categories available</option>';
            } else {
                categories.forEach(category => {
                    const option = document.createElement('option');
                    option.value = category;
                    option.textContent = category;
                    roomSelect.appendChild(option);
                });
            }
        })
        .catch(error => {
            console.error('Error loading categories:', error);
            roomSelect.innerHTML = '<option value="">Error loading categories</option>';
        });
});
    </script>
</body>
</html>
