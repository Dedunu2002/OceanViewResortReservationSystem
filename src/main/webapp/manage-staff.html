<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Staff | Ocean View Resort</title>
    <style>
        :root {
            --primary: #0A2540;
            --accent: #C9A24D;
            --bg: #F5F7FA;
            --text: #333333;
            --danger: #D32F2F;
            --success: #388E3C;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .dashboard-header {
            width: 100%;
            max-width: 800px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        h2 {
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn {
            background-color: var(--primary);
            color: white;
            padding: 10px 20px;
            text-decoration: none;
            border-radius: 4px;
            font-weight: bold;
            font-size: 14px;
            border: none;
            cursor: pointer;
            transition: background 0.3s;
        }

        .btn:hover { background-color: var(--accent); }
        .btn-danger { background-color: var(--danger); padding: 5px 10px; font-size: 12px; }
        .btn-danger:hover { background-color: #b71c1c; }

        .card {
            background: white;
            width: 100%;
            max-width: 800px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            overflow: hidden;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 15px 20px;
            text-align: left;
            border-bottom: 1px solid #eeeeee;
        }

        th {
            background-color: var(--primary);
            color: white;
            font-size: 14px;
            text-transform: uppercase;
        }

        tr:hover { background-color: #f9f9f9; }

        .role-badge {
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: bold;
            background-color: #e0e0e0;
        }

        .role-ADMIN { background-color: #e3f2fd; color: #1565c0; }
        .role-RECEPTIONIST { background-color: #f3e5f5; color: #7b1fa2; }

        #message-box {
            margin-bottom: 15px;
            padding: 10px;
            border-radius: 4px;
            display: none;
            width: 100%;
            max-width: 800px;
            text-align: center;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div id="message-box"></div>

<div class="dashboard-header">
    <h2>Staff Directory</h2>
    <div>
        <a href="add-staff.html" class="btn">+ Add New Staff</a>
        <a href="admin-dashboard.html" class="btn" style="background-color: #666; margin-left: 10px;">Back</a>
    </div>
</div>

<div class="card">
    <table id="staffTable">
        <thead>
        <tr>
            <th>ID</th>
            <th>Username</th>
            <th>Role</th>
            <th>Action</th>
        </tr>
        </thead>
        <tbody id="staffTableBody">
        <tr><td colspan="4" style="text-align: center;">Loading staff data...</td></tr>
        </tbody>
    </table>
</div>

<script>
    // 1. Run this code as soon as the HTML finishes loading
    document.addEventListener('DOMContentLoaded', fetchStaffData);

    // 2. Fetch the data from your Java Backend
    function fetchStaffData() {
        // We will need to create this API endpoint in Java next!
        fetch('api/staff-list')
            .then(response => {
                if (!response.ok) throw new Error('Network response was not ok');
                return response.json(); // Convert the response to JSON
            })
            .then(data => {
                renderTable(data);
            })
            .catch(error => {
                console.error('Error fetching staff:', error);
                document.getElementById('staffTableBody').innerHTML =
                    '<tr><td colspan="4" style="text-align:center; color:red;">Failed to load data.</td></tr>';
            });
    }

    // 3. Build the HTML dynamically
    function renderTable(staffArray) {
        const tbody = document.getElementById('staffTableBody');
        tbody.innerHTML = ''; // Clear the "Loading..." message

        if (staffArray.length === 0) {
            tbody.innerHTML = '<tr><td colspan="4" style="text-align:center;">No staff members found.</td></tr>';
            return;
        }

        staffArray.forEach(staff => {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>${staff.id}</td>
                <td><strong>${staff.username}</strong></td>
                <td><span class="role-badge role-${staff.role}">${staff.role}</span></td>
                <td>
                    <button onclick="deleteStaff(${staff.id})" class="btn btn-danger">Delete</button>
                </td>
            `;
            tbody.appendChild(tr);
        });
    }

    // 4. Handle Delete Action
    function deleteStaff(id) {
        if (confirm('Are you sure you want to delete this staff member?')) {
            // Call the existing DeleteStaffServlet
            window.location.href = `DeleteStaffServlet?id=${id}`;
        }
    }

    // 5. Handle success/error messages from URL parameters (e.g., ?deleted=success)
    const urlParams = new URLSearchParams(window.location.search);
    const msgBox = document.getElementById('message-box');
    if (urlParams.has('deleted')) {
        msgBox.style.display = 'block';
        msgBox.style.backgroundColor = 'var(--success)';
        msgBox.style.color = 'white';
        msgBox.innerText = 'Staff member successfully deleted.';
    } else if (urlParams.has('error')) {
        msgBox.style.display = 'block';
        msgBox.style.backgroundColor = 'var(--danger)';
        msgBox.style.color = 'white';
        msgBox.innerText = 'Error: Could not delete staff member.';
    }
</script>
</body>
</html>
