<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ocean View Resort - Staff Portal</title>
    <style>
        /* Modern reset and theme variables */
        :root {
            --primary: #0A2540;
            --secondary: #1E6F9F;
            --accent: #C9A24D;
            --bg: #F5F7FA;
            --text-main: #1C1C1C;
            --text-muted: #6B7280;
        }

        body {
    font-family: 'Segoe UI', sans-serif;
    /* Replace the URL with a real image path or Unsplash link */
    background: linear-gradient(rgba(10, 37, 64, 0.6), rgba(10, 37, 64, 0.6)),
                url('images/background.png');background-size: cover;
    background-position: center;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
}

.login-container {
    background: rgba(255, 255, 255, 0.95); /* Slight transparency for a glass look */
    backdrop-filter: blur(10px); /* Modern luxury effect */
    padding: 50px 40px;
    border-radius: 4px;
    box-shadow: 0 20px 40px rgba(0,0,0,0.2);
    width: 100%;
    max-width: 400px;
}

        h2 {
            color: var(--primary);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 600;
        }

        p.subtitle {
            color: var(--text-muted);
            font-size: 14px;
            margin-bottom: 30px;
        }

        .form-group {
            text-align: left;
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: var(--primary);
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        input {
            width: 100%;
            padding: 14px;
            border: 1px solid #E5E7EB;
            border-radius: 3px;
            box-sizing: border-box;
            font-size: 15px;
            transition: all 0.3s ease;
            background-color: #FCFDFF;
        }

        /* Accent Ocean Blue focus */
        input:focus {
            outline: none;
            border-color: var(--secondary);
            box-shadow: 0 0 0 3px rgba(30, 111, 159, 0.1);
        }

        /* Gold "Book Now" style CTA Button */
        button {
            width: 100%;
            padding: 16px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 3px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: background 0.3s ease, transform 0.2s ease;
            margin-top: 10px;
        }

        button:hover {
            background: #B08D3E; /* Darker Gold for hover */
            transform: translateY(-1px);
        }

        .footer-note {
            margin-top: 25px;
            font-size: 12px;
            color: var(--text-muted);
        }
    </style>
</head>
<body>
<div class="login-container">
    <h2>Ocean View</h2>
    <p class="subtitle">STAFF MANAGEMENT PORTAL</p>

    <form action="login" method="POST" novalidate>
        <div class="form-group">
            <label>Username</label>
            <input type="text" name="username" placeholder="Enter your credentials" required>
        </div>

        <div class="form-group">
            <label>Password</label>
            <input type="password" name="password" placeholder="••••••••" required>
        </div>

        <button type="submit">Access System</button>
    </form>

    <div class="footer-note">
        &copy; 2026 Ocean View Resort & Spa. <br> Private Access Only.
    </div>
</div>

<script>
    document.querySelector("form").addEventListener("submit", function(event) {
        const username = document.getElementsByName("username")[0].value.trim();
        const password = document.getElementsByName("password")[0].value.trim();

        if (username === "") {
            alert("Username cannot be empty.");
            event.preventDefault();
            return;
        }

        if (password === "") {
            alert("Password cannot be empty.");
            event.preventDefault();
            return;
        }

        if (username.length < 4) {
            alert("Username must be at least 4 characters long.");
            event.preventDefault(); // Stop form submission
            return;
        }

        if (password.length < 6) {
            alert("Password must be at least 6 characters long for security.");
            event.preventDefault();
            return;
        }
    });
</script>
</body>
</html>
