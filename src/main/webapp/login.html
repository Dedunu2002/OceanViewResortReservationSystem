<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ocean View Resort - Staff Portal</title>
    <style>
        /* Modern reset and theme variables */
        :root {
            --primary: #0A2540;
            --secondary: #1E6F9F;
            --accent: #C9A24D;
            --bg: #F5F7FA;
            --text-main: #1C1C1C;
            --text-muted: #6B7280;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: var(--text-main);
        }

        /* Container with a premium, subtle shadow */
        .login-container {
            background: white;
            padding: 50px 40px;
            border-radius: 4px; /* Slightly sharper corners feel more architectural/luxury */
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 400px;
            text-align: center;
            border-top: 5px solid var(--primary); /* Deep Navy Top border for brand identity */
        }

        h2 {
            color: var(--primary);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 600;
        }

        p.subtitle {
            color: var(--text-muted);
            font-size: 14px;
            margin-bottom: 30px;
        }

        .form-group {
            text-align: left;
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: var(--primary);
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        input {
            width: 100%;
            padding: 14px;
            border: 1px solid #E5E7EB;
            border-radius: 3px;
            box-sizing: border-box;
            font-size: 15px;
            transition: all 0.3s ease;
            background-color: #FCFDFF;
        }

        /* Accent Ocean Blue focus */
        input:focus {
            outline: none;
            border-color: var(--secondary);
            box-shadow: 0 0 0 3px rgba(30, 111, 159, 0.1);
        }

        /* Gold "Book Now" style CTA Button */
        button {
            width: 100%;
            padding: 16px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 3px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: background 0.3s ease, transform 0.2s ease;
            margin-top: 10px;
        }

        button:hover {
            background: #B08D3E; /* Darker Gold for hover */
            transform: translateY(-1px);
        }

        .footer-note {
            margin-top: 25px;
            font-size: 12px;
            color: var(--text-muted);
        }
    </style>
</head>
<body>
<div class="login-container">
    <h2>Ocean View</h2>
    <p class="subtitle">STAFF MANAGEMENT PORTAL</p>

    <form action="login" method="POST">
        <div class="form-group">
            <label>Username</label>
            <input type="text" name="username" placeholder="Enter your credentials" required>
        </div>

        <div class="form-group">
            <label>Password</label>
            <input type="password" name="password" placeholder="••••••••" required>
        </div>

        <button type="submit">Access System</button>
    </form>

    <div class="footer-note">
        &copy; 2026 Ocean View Resort & Spa. <br> Private Access Only.
    </div>
</div>
</body>
</html>
